# Synology / Dockhand: vorgefertigtes Image von GitHub Container Registry pullen.
# network_mode: host → kein extra Docker-Netzwerk (kein Subnetz-Konflikt auf der NAS).
#
# Dockhand: Compose-Pfad = docker-compose.synology.yml
# Registry-Login für ghcr.io erforderlich (privates Repo) – siehe DOCKER.md
name: weathergod

services:
  weathergod:
    image: ghcr.io/akadawa/weathergod:latest
    container_name: weathergod
    restart: unless-stopped
    network_mode: host
    environment:
      NODE_ENV: production
      PORT: "${HOST_PORT:-8080}"
      TZ: ${TZ:-UTC}
      WEST_ANGLE_THRESHOLD: ${WEST_ANGLE_THRESHOLD:-15}
      DEFAULT_LAT: ${DEFAULT_LAT:-}
      DEFAULT_LON: ${DEFAULT_LON:-}
      DATABASE_PATH: /app/data/weathergod.db
      RADAR_NOWCAST_URL: ${RADAR_NOWCAST_URL:-https://api.librewxr.net/public/weather-maps.json}
      NTFY_AUTO_ENABLED: ${NTFY_AUTO_ENABLED:-false}
      NTFY_SERVER: ${NTFY_SERVER:-https://ntfy.sh}
      NTFY_TOPIC: ${NTFY_TOPIC:-}
      NTFY_TOKEN: ${NTFY_TOKEN:-}
    volumes:
      - weathergod-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${HOST_PORT:-3000}/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    labels:
      org.opencontainers.image.title: WeatherGod
      org.opencontainers.image.source: https://github.com/akadawa/WeatherGod

volumes:
  weathergod-data:
    name: weathergod-data
